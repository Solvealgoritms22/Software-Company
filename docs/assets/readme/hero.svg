<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Software Company AI Factory</title>
  <desc id="desc">Architecture banner showing an AI software factory with dashboard, orchestrator, MCP tools and knowledge base.</desc>
