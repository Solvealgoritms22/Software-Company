  <text x="90" y="154" fill="#5F5B55" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Motor de agentes para planificar, construir, validar y documentar proyectos de software con MCP, trazabilidad y control de costos.</text>

  <rect x="88" y="206" width="220" height="92" rx="14" fill="#EAF5F2" stroke="#1D7F6E"/>
