skills:
- name: Executive intake and decision governance
  description: Captures founder intent, business constraints, budget limits, approval gates and success criteria, then converts them into decisions that keep the project aligned and stoppable when risk becomes unacceptable.
- name: Stakeholder discovery
  description: Uses structured discovery, 5 Whys, assumptions mapping and stakeholder segmentation to reveal real users, jobs-to-be-done, business value, hidden constraints and unresolved questions.
- name: Requirements engineering
  description: Converts goals into functional requirements, non-functional requirements, acceptance criteria, edge cases, data needs, integrations, exclusions and traceable user stories.
- name: Product roadmap planning
  description: Prioritizes features by value, urgency, dependency, technical risk and implementation cost; defines MVP, release slices, milestones and measurable product outcomes.
- name: Contract and compliance drafting
  description: Produces operational contract drafts covering scope, milestones, acceptance, IP, confidentiality, warranties, termination, payment triggers and known legal/commercial risks.
- name: Product design research
  description: Frames user workflows, personas, task frequency, usability risks and domain context so UI decisions serve real usage instead of generic presentation.
- name: Information architecture and UX flows
  description: Designs navigation, workflow order, screen states, decision points, empty states, error states and interaction flows that minimize cognitive load and rework.
- name: Visual interface systems
  description: Defines reusable UI patterns, component hierarchy, spacing, color, typography, density and visual states aligned with the product domain and existing design conventions.
- name: System architecture and ADRs
  description: Designs modular architecture, dependency direction, service boundaries, runtime topology and ADRs that document tradeoffs, alternatives and final technical decisions.
- name: API contract design
  description: Specifies endpoint/resource contracts, request/response schemas, auth assumptions, validation rules, error semantics, versioning and client integration expectations.
- name: Backend service design
  description: Defines backend modules, domain logic, data flow, reliability expectations, validation, transaction boundaries, idempotency, logging and integration surfaces.
- name: Python/FastAPI engineering
  description: Implements maintainable Python/FastAPI services using typed models, dependency injection, async-safe behavior, focused routers, error handling and testable modules.
- name: Data modeling and SQL design
  description: Designs normalized relational data models, keys, constraints, migrations, query paths and storage choices that preserve integrity and support product workflows.
- name: Database performance tuning
  description: Reviews indexes, query plans, transaction scope, retention, locking, pagination and high-volume access patterns to keep database behavior predictable under load.
- name: Frontend architecture
  description: Defines routing, component boundaries, state ownership, data loading, rendering strategy, accessibility constraints and performance budgets for scalable React applications.
- name: React/Next.js implementation
  description: Builds production UI with React and Next.js patterns, stable state, accessible components, responsive layout, clear data flows and minimal unnecessary re-renders.
- name: Accessibility engineering
  description: Applies semantic structure, keyboard support, focus management, color contrast, labels, responsive sizing and assistive technology expectations to UI workflows.
- name: Mobile app architecture
  description: Plans mobile screens, API integration, offline behavior, auth, push notifications, platform constraints, performance and parity with web product goals.
- name: AI integration and prompt orchestration
  description: Designs model-provider usage, prompt contracts, tool calling boundaries, fallback behavior, RAG inputs, JSON outputs and hallucination controls for agent workflows.
- name: MCP tool strategy
  description: Maps agents to built-in tools and MCP servers based on role, least privilege, runtime availability, approval policy and operational safety.
- name: QA test strategy
  description: Defines risk-based test coverage, smoke tests, regression suites, acceptance checks, test data and release criteria tied directly to requirements.
- name: E2E automation
  description: Builds browser and integration automation that exercises real user paths, captures useful evidence and avoids brittle selectors or unnecessary test volume.
- name: Security threat modeling
  description: Identifies assets, trust boundaries, abuse cases, auth gaps, injection risks, data exposure, dependency risk and operational attack paths before release.
- name: AppSec review and hardening
  description: Reviews code, dependencies, headers, secrets, auth, authorization, storage, logging and deployment posture; produces prioritized remediation steps.
- name: DevOps release engineering
  description: Plans environments, deployment paths, rollback, release gates, infrastructure assumptions and operational ownership for stable production launches.
- name: CI/CD and deployment automation
  description: Designs and implements build, test, package, deploy and rollback workflows with clear checks, secrets separation and auditable release behavior.
- name: Observability and incident response
  description: Defines logs, traces, metrics, dashboards, alerts, incident triage, escalation, customer communication and post-incident follow-up.
- name: Technical documentation
  description: Produces concise technical guides, architecture notes, API references, setup instructions, runbooks and handoff material usable by maintainers.
- name: Scrum facilitation
  description: Organizes sprint planning, dependency tracking, blocker escalation, status reporting and delivery cadence without adding process overhead.
- name: Cross-agent coordination
  description: Aligns multiple specialist agents, resolves ownership gaps, sequences dependencies and ensures downstream agents receive complete context.
- name: Debugging and root cause analysis
  description: Investigates failures by reading evidence, reproducing behavior, isolating root cause, proposing minimal fixes and defining validation steps.
- name: Artifact quality review
  description: Checks outputs for completeness, internal consistency, traceability, next-agent usefulness, missing assumptions and acceptance against phase goals.
- name: Cost and token governance
  description: Controls context size, model usage, repeated calls, artifact reuse, budget signals and escalation thresholds to keep AI operations efficient.
- name: Repository operations
  description: Uses Git, GitHub and filesystem workflows safely for branch review, patch preparation, code inspection, search, pull requests and change tracking.
- name: Knowledge management and RAG
  description: Structures reusable knowledge, artifact memory, citations, retrieval terms and documentation so later phases can use context without full-history bloat.
- name: Performance engineering
  description: Reviews latency, resource use, rendering cost, database load, concurrency, caching, memory pressure and scalability under realistic constraints.
- name: Risk management
  description: Identifies technical, product, legal, operational and delivery risks, then assigns likelihood, impact, mitigation, owner and escalation triggers.
- name: Client communication
  description: Communicates decisions, tradeoffs, status, blockers and approvals in concise founder-safe language with clear next steps.
- name: Deliverable synthesis
  description: Converts analysis into structured artifacts with summary, actionable detail, risks, dependencies, next inputs and citations where relevant.
- name: Code review and maintainability
  description: Reviews code for correctness, simplicity, module boundaries, tests, edge cases, resource lifecycle, readability and long-term ownership.
- name: Data privacy and secrets management
  description: Protects credentials, provider keys, user data, logs, config files, MCP env values and privacy-sensitive flows through least privilege and redaction.
- name: Production readiness review
  description: Validates that requirements, implementation, tests, security, observability, documentation and rollback plans are complete enough for release.

deliverables:
- code: project_plan
  name: Project Plan
  description: Founder-facing delivery plan with goals, phases, owners, assumptions, constraints, budget guardrails and approval gates.
- code: task_dag
  name: Task Dependency Graph
  description: Ordered dependency map showing which phases, agents and deliverables must complete before downstream work starts.
- code: approval_report
  name: Approval Report
  description: Concise decision packet summarizing completed work, unresolved risks, required founder decisions and recommended approval status.
- code: brd
  name: Business Requirements Document
  description: Requirements artifact covering business goals, users, functional and non-functional requirements, assumptions, exclusions and acceptance criteria.
- code: user_stories
  name: User Stories
  description: Prioritized backlog with user stories, acceptance criteria, edge cases, dependencies and implementation notes.
- code: product_roadmap
  name: Product Roadmap
  description: MVP and release sequencing plan with feature priority, rationale, dependencies and measurable outcomes.
- code: risk_register
  name: Risk Register
  description: Risk table with category, impact, likelihood, mitigation, owner, escalation trigger and current status.
- code: contract_markdown
  name: Contract Markdown
  description: Contract draft in Markdown with scope, milestones, acceptance, IP, confidentiality, payment and termination clauses.
- code: contract_pdf
  name: Contract PDF
  description: Packaged contract-ready document or export instructions for founder/client review.
- code: architecture_diagram
  name: Architecture Diagram
